<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin Board for AI</title>
    <link rel="icon" type="image/x-icon" href="https://www.google.com/s2/favicons?domain=youtube.com&sz=64">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --accent: #ef4444; --accent-hover: #dc2626;
            --text-main: #f1f5f9; --text-dim: #94a3b8; --danger: #f43f5e; --success: #10b981; --border: #334155;
        }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1400px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .nav-tabs { display: flex; gap: 20px; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; width: 100%; }
        .nav-tab { cursor: pointer; color: var(--text-dim); font-weight: 600; padding: 5px 10px; font-size: 1.1rem; }
        .nav-tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); }
        .user-profile { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--border); }
        .btn-main { background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700; }
        .btn-toggle { background: #334155; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; }
        
        .post-list { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 1rem; overflow: hidden; margin-top: 1rem; table-layout: fixed; }
        .post-list td, .post-list th { padding: 18px 20px; text-align: left; border-bottom: 1px solid var(--border); }
        .col-no { width: 200px; text-align: center; color: var(--text-dim); }

        .admin-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; table-layout: fixed; }
        .admin-table th, .admin-table td { border-bottom: 1px solid var(--border); padding: 12px 15px; text-align: left; font-size: 0.85rem; word-break: break-all; }
        @media (min-aspect-ratio: 1/1) { .col-link { width: 10%; } .col-title-db { width: 30%; } .col-summary-db { width: 50%; } .col-view { width: 10%; } }
        @media (max-aspect-ratio: 1/1) { .col-summary-db { display: none; } .col-link { width: 25%; } .col-title-db { width: 55%; } .col-view { width: 20%; } }

        #result-area { display: none; gap: 2rem; width: 100%; margin-top: 2rem; }
        @media (min-aspect-ratio: 1/1) { #result-area { grid-template-columns: 1fr 1fr; } }
        @media (max-aspect-ratio: 1/1) { #result-area { grid-template-columns: 1fr; } }
        .video-player-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 1rem; overflow: hidden; background: black; border: 1px solid var(--border); }
        .video-player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        
        .auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: none; flex-direction: column; z-index: 2000; }
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { width: 220px; border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        .admin-sidebar button { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; }
        .admin-sidebar button.active { background: var(--accent); color: white; }
        .admin-content { flex: 1; padding: 2rem; overflow-y: auto; background: #0f172a; }
        .loader { border: 4px solid rgba(239, 68, 68, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header><h1 style="cursor:pointer" onclick="location.reload()">📋 Bulletin Board for AI</h1><div id="user-menu"></div></header>
        <nav class="nav-tabs"><div class="nav-tab active" id="tab-board" onclick="switchTab('board')">커뮤니티</div><div class="nav-tab" id="tab-tool" onclick="switchTab('tool')">요약 도구</div></nav>
        
        <div id="section-board" style="width:100%">
            <div id="board-list-view">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;"><h2>📝 커뮤니티 게시판</h2><button onclick="openWriteForm()" class="btn-main" id="btn-write" style="display:none">글쓰기</button></div>
                <table class="post-list"><thead><tr><th class="col-no">No.</th><th>제목</th></tr></thead><tbody id="post-list-body"></tbody></table>
            </div>
            <div id="board-detail-view" style="display:none">
                <button onclick="loadPosts()" class="btn-toggle" style="margin-bottom:1.5rem;">← 목록으로</button>
                <div class="post-detail"><h2 id="view-title"></h2><div id="view-meta" style="margin-bottom:1.5rem;font-size:0.9rem;color:var(--text-dim);border-bottom:1px solid var(--border);padding-bottom:10px;"></div><div id="view-content" class="post-body"></div><div id="post-actions" style="margin-top:2rem;display:flex;gap:10px;"></div><div style="margin-top:3rem;"><h3>댓글</h3><div id="comment-list"></div><div id="comment-form-area" style="display:none;margin-top:1.5rem;background:#0f172a;padding:1.5rem;border-radius:1rem;border:1px solid var(--border);"><textarea id="new-comment" style="width:100%;background:transparent;border:none;color:white;padding:5px;outline:none;" rows="3" placeholder="댓글을 남겨주세요."></textarea><div style="text-align:right"><button onclick="submitComment()" class="btn-main">등록</button></div></div></div></div>
            </div>
            <div id="board-write-view" style="display:none"><input type="text" id="post-title" placeholder="제목" style="width:100%;padding:1rem;margin-bottom:1rem;background:#0f172a;border:1px solid var(--border);color:white;border-radius:0.5rem;font-size:1.2rem;"><div id="editor-container" style="height:400px;background:#0f172a;color:white;"></div><div style="margin-top:1.5rem;display:flex;gap:10px;"><button onclick="submitPost()" class="btn-main">등록</button><button onclick="loadPosts()" class="btn-toggle">취소</button></div></div>
        </div>

        <div id="section-tool" style="display:none;width:100%">
            <div style="display:flex;gap:12px;margin-bottom:2rem;background:var(--card-bg);padding:1.5rem;border-radius:1rem;border:1px solid var(--border);"><input type="text" id="url-input" placeholder="YouTube 링크" style="flex:1;background:#0f172a;border:1px solid var(--border);padding:1rem;color:white;border-radius:0.5rem"><button onclick="startAnalysis()" class="btn-main">분석 시작</button></div>
            <div id="status-area" style="text-align:center;padding:1rem;display:none;"></div>
            <div id="result-area">
                <div class="left-col">
                    <div id="video-container" class="video-player-container"></div>
                    <div class="card"><div style="display:flex;justify-content:space-between;align-items:center;"><h2>📝 자막 전문</h2><button onclick="toggleCard('transcript-view', 'btn-sub')" id="btn-sub" class="btn-toggle">펼치기</button></div><div id="transcript-view" style="display:none;margin-top:1rem;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-size:0.9rem;"></div></div>
                    <div class="card" id="download-card" style="display:none"><div style="display:flex;justify-content:space-between;align-items:center;"><h2>📥 다운로드</h2><button onclick="toggleCard('download-list', 'btn-dl')" id="btn-dl" class="btn-toggle">펼치기</button></div><div id="download-list" style="display:none;margin-top:1rem;display:flex;flex-wrap:wrap;gap:10px;"></div></div>
                </div>
                <div class="right-col"><div class="card"><h2>✨ AI 핵심 요약</h2><div id="summary-view" style="line-height:1.8;"></div></div></div>
            </div>
        </div>

        <div class="auth-modal" id="auth-modal"><div class="modal-content"><h3 id="modal-title">로그인</h3><input type="email" id="auth-email" placeholder="이메일" style="width:100%;margin-bottom:10px;padding:12px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:8px;"><input type="password" id="auth-password" placeholder="비밀번호" style="width:100%;margin-bottom:10px;padding:12px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:8px;"><div id="register-fields" style="display:none"><input type="text" id="auth-name" placeholder="이름" style="width:100%;margin-bottom:10px;padding:12px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:8px;"></div><button class="btn-main" style="width:100%" onclick="handleAuth()">확인</button><div style="margin:15px 0;text-align:center;color:var(--text-dim)">OR</div><div id="google-login-btn"></div><p onclick="switchAuth()" style="cursor:pointer;text-align:center;margin-top:15px;font-size:0.9rem;">회원가입/로그인 전환</p><p onclick="closeAuth()" style="cursor:pointer;text-align:center;color:var(--danger);margin-top:10px;font-size:0.9rem;">닫기</p></div></div>
        <div class="admin-modal" id="admin-modal"><div class="admin-header" style="padding:20px; background:var(--card-bg); display:flex; justify-content:space-between; border-bottom:1px solid var(--border);"><h2>⚙️ 관리자 대시보드</h2><button onclick="closeAdmin()" class="btn-toggle">닫기</button></div><div class="admin-layout"><div class="admin-sidebar"><button id="tab-users" onclick="loadAdminTab('users')">👥 회원 관리</button><button id="tab-videos" onclick="loadAdminTab('videos')">🎥 비디오 DB</button><button id="tab-logs" onclick="loadAdminTab('logs')">📊 접속 로그</button><button id="tab-blocks" onclick="loadAdminTab('blocks')">🛑 IP 차단</button></div><div class="admin-content" id="admin-content"></div></div></div>
    </div>

    <script>
        const API_BASE = "https://tubeapi.tor-ai.com";
        const GOOGLE_CLIENT_ID = "818619054130-32i1a8vcj21gc1i33mhrnsu84gnvm6h0.apps.googleusercontent.com";
        let quill = null, currentPostId = null, replyToId = null, editingData = null;

        function formatDate(s) { const d = new Date(s); return `${String(d.getFullYear()).slice(-2)}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`; }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('user'));
            const menu = document.getElementById('user-menu');
            const btnWrite = document.getElementById('btn-write');
            const commentArea = document.getElementById('comment-form-area');
            if (user) {
                let ab = user.level === 'admin' ? `<button onclick="openAdmin()" style="background:var(--success); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; margin-left:10px;">관리자</button>` : '';
                menu.innerHTML = `<div class="user-profile"><span>${user.name}님</span>${ab}<button onclick="logout()" style="margin-left:10px;background:transparent;border:none;color:var(--text-dim);cursor:pointer">로그아웃</button></div>`;
                if(btnWrite) btnWrite.style.display = user.level!=='pending'?'block':'none';
                if(commentArea) commentArea.style.display = user.level!=='pending'?'block':'none';
            } else {
                menu.innerHTML = `<button onclick="openAuth('login')" style="background:transparent;color:white;border:none;cursor:pointer">로그인</button><button onclick="openAuth('register')" class="btn-main" style="margin-left:10px">회원가입</button>`;
                if(btnWrite) btnWrite.style.display = 'none';
                if(commentArea) commentArea.style.display = 'none';
            }
        }

        async function handleGoogleLogin(r) {
            const resp = await fetch(`${API_BASE}/auth/google`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: r.credential }) });
            const d = await resp.json();
            if (resp.ok) { localStorage.setItem('token', d.access_token); localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); }
        }
        function initGoogleSSO() { if (window.google) { google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleLogin }); google.accounts.id.renderButton(document.getElementById("google-login-btn"), { theme: "outline", size: "large", width: 320 }); } }
        window.onload = () => { updateUI(); loadPosts(); setTimeout(initGoogleSSO, 500); };

        function switchTab(t) { document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); document.getElementById('section-board').style.display = t === 'board' ? 'block' : 'none'; document.getElementById('section-tool').style.display = t === 'tool' ? 'block' : 'none'; if(t==='board') loadPosts(); }

        async function loadPosts() {
            document.getElementById('board-list-view').style.display='block'; document.getElementById('board-detail-view').style.display='none'; document.getElementById('board-write-view').style.display='none';
            try {
                const posts = await (await fetch(`${API_BASE}/posts`)).json();
                document.getElementById('post-list-body').innerHTML = posts.map(p => `<tr onclick='viewPost(${JSON.stringify(p).replace(/'/g, "&apos;")})'><td class="col-no">${p.id}</td><td style="font-weight:600">${p.title}</td></tr>`).join('');
            } catch(e) {}
        }

        async function viewPost(p) {
            currentPostId = p.id; const data = await (await fetch(`${API_BASE}/posts/${p.id}`)).json();
            document.getElementById('board-list-view').style.display='none'; document.getElementById('board-detail-view').style.display='block';
            document.getElementById('view-title').innerText = data.post.title; document.getElementById('view-content').innerHTML = data.post.content;
            const user = JSON.parse(localStorage.getItem('user')), isPriv = user && (user.level==='admin' || user.level==='user2'), meta = document.getElementById('view-meta');
            if (isPriv) {
                let ipStr = (user.level === 'admin' && data.post.author_ip) ? ` | IP: ${data.post.author_ip}` : '';
                meta.innerHTML = `<div>작성자: <strong>${data.post.author_name}</strong>${ipStr}</div><div>날짜: ${formatDate(data.post.created_at)}</div>`;
                meta.style.display = 'flex';
            } else { meta.style.display = 'none'; }
            const ac = document.getElementById('post-actions'); ac.innerHTML = '';
            if (user && (user.email === data.post.author_email || user.level === 'admin')) {
                const eb = document.createElement('button'); eb.className='btn-toggle'; eb.innerText='수정'; eb.onclick=()=>openEditForm(data.post); ac.appendChild(eb);
                const db = document.createElement('button'); db.className='btn-toggle'; db.style.color='var(--danger)'; db.innerText='삭제'; db.onclick=()=>deletePost(data.post.id); ac.appendChild(db);
            }
            renderComments(data.comments); updateUI();
        }

        function openWriteForm() { 
            document.getElementById('board-list-view').style.display='none'; document.getElementById('board-detail-view').style.display='none'; document.getElementById('board-write-view').style.display='block';
            if(!quill) quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], ['image']] } });
            quill.root.innerHTML = ''; document.getElementById('post-title').value = ''; editingData = null;
        }
        function openEditForm(p) { openWriteForm(); quill.root.innerHTML = p.content; document.getElementById('post-title').value = p.title; editingData = p; }
        async function submitPost() {
            const t = document.getElementById('post-title').value, c = quill.root.innerHTML; if(!t || quill.getText().trim()==='') return alert("내용 입력!");
            const m = editingData ? 'PUT' : 'POST', url = editingData ? `${API_BASE}/posts/${editingData.id}` : `${API_BASE}/posts`;
            const resp = await fetch(url, { method: m, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ title:t, content:c }) });
            if(resp.ok) { alert("완료"); loadPosts(); }
        }
        async function deletePost(id) { if(!confirm("삭제?")) return; await fetch(`${API_BASE}/posts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } }); loadPosts(); }

        function renderComments(cms) {
            const list = document.getElementById('comment-list'), user = JSON.parse(localStorage.getItem('user')), isPriv = user && (user.level==='admin' || user.level==='user2');
            list.innerHTML = cms.filter(c => !c.parent_id).map(root => {
                const children = cms.filter(c => c.parent_id === root.id);
                let ipStr = (user && user.level === 'admin' && root.author_ip) ? ` | IP: ${root.author_ip}` : '';
                let meta = isPriv ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:5px;"><strong>${root.author_name}</strong>${ipStr} | ${formatDate(root.created_at)}</div>` : '';
                let h = `<div class="comment-item">${meta}<div>${root.content}</div><div style="margin-top:5px;display:flex;gap:10px;font-size:0.8rem;color:var(--accent);"><span onclick="setReply(${root.id}, '${root.author_name}')" style="cursor:pointer">답글</span>${(user&&(user.email===root.author_email||user.level==='admin'))?`<span onclick="deleteComment(${root.id})" style="cursor:pointer;color:var(--danger)">삭제</span>`:''}</div></div>`;
                children.forEach(child => {
                    let cip = (user && user.level === 'admin' && child.author_ip) ? ` | IP: ${child.author_ip}` : '';
                    let cmeta = isPriv ? `<div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:5px;"><strong>${child.author_name}</strong>${cip} | ${formatDate(child.created_at)}</div>` : '';
                    h += `<div class="comment-item" style="margin-left:30px; border-left:2px solid var(--border); padding-left:15px;">${cmeta}<div>${child.content}</div>${(user&&(user.email===child.author_email||user.level==='admin'))?`<span onclick="deleteComment(${child.id})" style="cursor:pointer;color:var(--danger)">삭제</span>`:''}</div>`;
                }); return h;
            }).join('');
        }
        function setReply(id, name) { replyToId = id; const i = document.getElementById('new-comment'); i.placeholder = `@${name}님께 답글...`; i.focus(); }
        async function submitComment() {
            const c = document.getElementById('new-comment').value; if(!c) return;
            await fetch(`${API_BASE}/posts/${currentPostId}/comments`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ content:c, parent_id: replyToId }) });
            document.getElementById('new-comment').value = ''; replyToId = null;
            const p = await (await fetch(`${API_BASE}/posts/${currentPostId}`)).json(); renderComments(p.comments);
        }
        async function deleteComment(id) { if(!confirm("삭제?")) return; await fetch(`${API_BASE}/comments/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } }); const p = await (await fetch(`${API_BASE}/posts/${currentPostId}`)).json(); renderComments(p.comments); }

        function logout() { localStorage.clear(); location.reload(); }
        function openAuth(m) { document.getElementById('auth-modal').style.display = 'flex'; document.getElementById('modal-title').innerText = m==='login'?'로그인':'회원가입'; document.getElementById('register-fields').style.display = m==='login'?'none':'block'; initGoogleSSO(); }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function switchAuth() { openAuth(document.getElementById('modal-title').innerText==='로그인'?'register':'login'); }
        async function handleAuth() {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value, n = document.getElementById('auth-name').value, isL = document.getElementById('modal-title').innerText === '로그인';
            const resp = await fetch(`${API_BASE}${isL ? '/login' : '/register'}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email:e, password:p, name:n }) });
            const d = await resp.json(); if(resp.ok) { if(isL) { localStorage.setItem('token', d.access_token); localStorage.setItem('user', JSON.stringify(d.user)); location.reload(); } else { alert("성공"); openAuth('login'); } } else { alert(d.detail); }
        }

        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; loadAdminTab('users'); }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        async function loadAdminTab(t) {
            const content = document.getElementById('admin-content'); content.innerHTML = '<div class="loader"></div>';
            document.querySelectorAll('.admin-sidebar button').forEach(b => b.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active');
            try {
                const data = await (await fetch(`${API_BASE}/admin/${t}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } })).json();
                if (t === 'users') { content.innerHTML = '<h2>회원 관리</h2><table class="admin-table"><thead><tr><th>이름</th><th>이메일</th><th>레벨</th></tr></thead><tbody>' + data.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td><select onchange="updateLevel('${u.email}', this.value)"><option value="admin" ${u.level==='admin'?'selected':''}>관리자</option><option value="user2" ${u.level==='user2'?'selected':''}>일반2</option><option value="user" ${u.level==='user'?'selected':''}>일반</option><option value="pending" ${u.level==='pending'?'selected':''}>보류</option></select></td></tr>`).join('') + '</tbody></table>'; }
                else if (t === 'videos') { content.innerHTML = '<h2>비디오 DB</h2><table class="admin-table"><thead><tr><th class="col-link">ID</th><th class="col-title-db">제목</th><th class="col-summary-db">요약</th><th class="col-view">조회</th></tr></thead><tbody>' + data.map(v => `<tr><td class="col-link"><a href="https://youtube.com/watch?v=${v.video_id}" target="_blank" style="color:var(--accent)">${v.video_id}</a></td><td class="col-title-db">${v.title}</td><td class="col-summary-db"><div style="max-height:80px;overflow-y:auto;">${v.summary || ''}</div></td><td class="col-view">${v.view_count}회</td></tr>`).join('') + '</tbody></table>'; }
                else if (t === 'logs') { content.innerHTML = '<h2>접속 로그</h2><table class="admin-table"><thead><tr><th>IP</th><th>경로</th><th>시간</th></tr></thead><tbody>' + data.map(l => `<tr><td>${l.ip}</td><td>${l.endpoint} (${l.method})</td><td>${l.created_at.replace('T',' ')}</td></tr>`).join('') + '</tbody></table>'; }
                else if (t === 'blocks') { content.innerHTML = '<h2>IP 차단</h2><div style="margin-bottom:20px;display:flex;gap:10px;"><input id="b-ip" placeholder="IP" style="padding:10px;background:#0f172a;color:white;border:1px solid var(--border);"><input id="b-r" placeholder="사유" style="padding:10px;background:#0f172a;color:white;border:1px solid var(--border);"><button onclick="doBlock()" class="btn-main">차단</button></div><table class="admin-table"><thead><tr><th>IP</th><th>사유</th><th>해제</th></tr></thead><tbody>' + data.map(b => `<tr><td>${b.ip}</td><td>${b.reason}</td><td><button onclick="unBlock('${b.ip}')" class="btn-toggle" style="background:var(--danger)">해제</button></td></tr>`).join('') + '</tbody></table>'; }
            } catch(e) { content.innerHTML = "오류 발생"; }
        }
        async function updateLevel(e, l) { await fetch(`${API_BASE}/admin/update_user_level`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ email:e, level:l }) }); alert("완료"); }
        async function doBlock() { const ip = document.getElementById('b-ip').value, r = document.getElementById('b-r').value; await fetch(`${API_BASE}/admin/block_ip`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ ip, reason: r }) }); loadAdminTab('blocks'); }
        async function unBlock(ip) { await fetch(`${API_BASE}/admin/block_ip/${ip}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } }); loadAdminTab('blocks'); }

        function toggleCard(id, btnId) { const el = document.getElementById(id), btn = document.getElementById(btnId); const isNone = el.style.display === 'none'; el.style.display = isNone ? 'block' : 'none'; btn.innerText = isNone ? '접기' : '펼치기'; }

        async function startAnalysis() {
            const url = document.getElementById('url-input').value.trim(); if(!url) return;
            const resArea = document.getElementById('result-area'), sArea = document.getElementById('status-area'), sm = document.getElementById('summary-view'), tr = document.getElementById('transcript-view'), vc = document.getElementById('video-container');
            resArea.style.display = 'none'; sArea.style.display = 'block'; sArea.innerHTML = '<div class="loader"></div> <span>분석 중...</span>';
            sm.innerHTML = ''; tr.innerText = ''; vc.innerHTML = '';
            try {
                const resp = await fetch(`${API_BASE}/smart-subtitles`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ url }) });
                const reader = resp.body.getReader(), decoder = new TextDecoder(); 
                let buffer = "", acc = ""; resArea.style.display = 'grid';
                while(true) {
                    const {done, value} = await reader.read(); if(done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const parts = buffer.split('\n\n'); buffer = parts.pop();
                    for (const p of parts) {
                        if (p.startsWith('data: ')) {
                            try {
                                const d = JSON.parse(p.substring(6));
                                if (d.type === 'video_id') vc.innerHTML = `<iframe src="https://www.youtube.com/embed/${d.value}" frameborder="0" allowfullscreen></iframe>`;
                                else if (d.type === 'chunk') { acc += d.value; sm.innerHTML = marked.parse(acc); }
                                else if (d.type === 'transcript') tr.innerText = d.value;
                                else if (d.type === 'can_download') loadDL(d.url);
                                else if (d.type === 'done') sArea.style.display = 'none';
                            } catch(e) {}
                        }
                    }
                }
            } catch(e) { sArea.innerHTML = "오류 발생"; }
        }
        async function loadDL(url) {
            document.getElementById('download-card').style.display = 'block';
            const dl = await (await fetch(`${API_BASE}/video-formats?url=${encodeURIComponent(url)}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } })).json();
            document.getElementById('download-list').innerHTML = dl.formats.map(f => `<button class="btn-toggle" onclick="downF('${url}', '${f.format_id}')">${f.resolution}</button>`).join('');
        }
        async function downF(url, fid) {
            const resp = await fetch(`${API_BASE}/download-file?url=${encodeURIComponent(url)}&format_id=${fid}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            const blob = await resp.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "download"; a.click();
        }
    </script>
</body>
</html>
