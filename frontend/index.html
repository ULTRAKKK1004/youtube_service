<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI 요약기</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: #334155;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2.5rem; width: 100%; padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .user-menu { display: flex; gap: 10px; align-items: center; }
        .user-profile { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; }
        .user-profile img { width: 28px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); }
        .user-name { font-weight: 600; color: var(--accent); }

        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); padding: 2.5rem; border-radius: 1.5rem;
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem; }
        .modal-content input {
            width: 100%; padding: 0.85rem; margin-bottom: 1rem;
            background: #0f172a; border: 1px solid var(--border); border-radius: 0.75rem; color: white;
            font-size: 1rem;
        }
        .modal-content input:focus { border-color: var(--accent); outline: none; }
        
        #auth-msg { 
            padding: 10px; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; display: none;
        }
        .msg-error { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .msg-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }

        .auth-btn { width: 100%; padding: 0.85rem; margin-bottom: 1rem; background: var(--accent); color: white; border: none; border-radius: 0.75rem; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .auth-btn:hover { background: var(--accent-hover); }

        .switch-auth { text-align: center; font-size: 0.9rem; color: var(--text-dim); cursor: pointer; margin-top: 1rem; }
        .switch-auth:hover { color: white; text-decoration: underline; }

        .input-section {
            display: flex; gap: 12px; margin-bottom: 2.5rem;
            background: var(--card-bg); padding: 1.5rem;
            border-radius: 1rem; border: 1px solid var(--border);
        }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; color: white; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; display: none; }
        .video-player-container { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 1rem; overflow: hidden; background: black; }
        .video-player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .transcript-container { margin-top: 1rem; max-height: 400px; overflow-y: auto; display: none; white-space: pre-wrap; background: #0f172a; padding: 1rem; }
        
        #status-area { text-align: center; padding: 1rem; display: none; }
        .loader { border: 4px solid rgba(239, 68, 68, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Admin UI */
        .admin-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: none; flex-direction: column;
            z-index: 2000; overflow: hidden;
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { width: 220px; background: var(--card-bg); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        .admin-sidebar button { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 12px; text-align: left; border-radius: 8px; font-size: 0.95rem; }
        .admin-sidebar button:hover { background: #334155; }
        .admin-sidebar button.active { background: var(--accent); color: white; border-color: var(--accent); }
        .admin-content { flex: 1; padding: 2rem; overflow-y: auto; background: #0f172a; }
        
        .admin-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
        .admin-table th, .admin-table td { border-bottom: 1px solid var(--border); padding: 12px 15px; text-align: left; font-size: 0.9rem; }
        .admin-table th { background: #1e293b; color: var(--accent); font-weight: 600; border-bottom: 2px solid var(--border); }
        .admin-table tr:hover { background: rgba(255,255,255,0.02); }
        
        .btn-danger { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-danger:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 YouTube AI</h1>
            <div class="user-menu" id="user-menu">
                <!-- 여기에 로그인 상태 표시 -->
            </div>
        </header>

        <!-- 인증 모달 -->
        <div class="auth-modal" id="auth-modal">
            <div class="modal-content">
                <h3 id="modal-title">로그인</h3>
                <div id="auth-msg"></div>
                
                <div id="register-fields" style="display: none;">
                    <input type="text" id="auth-name" placeholder="이름 (닉네임)">
                </div>
                <input type="email" id="auth-email" placeholder="이메일">
                <input type="password" id="auth-password" placeholder="비밀번호">
                <button class="auth-btn" id="auth-submit-btn" onclick="handleAuth()">확인</button>
                
                <div style="margin: 1.5rem 0; position: relative; text-align: center;">
                    <hr style="border: 0; border-top: 1px solid var(--border);">
                    <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 0 10px; font-size: 0.8rem; color: var(--text-dim);">OR</span>
                </div>
                
                <div id="g_id_onload"
                     data-client_id="818619054130-32i1a8vcj21gc1i33mhrnsu84gnvm6h0.apps.googleusercontent.com"
                     data-callback="handleGoogleLogin">
                </div>
                <div class="g_id_signin" data-type="standard" data-width="320"></div>

                <p class="switch-auth" id="auth-switch" onclick="switchAuth()">계정이 없으신가요? 회원가입</p>
                <p class="switch-auth" onclick="closeAuth()" style="color: var(--danger);">닫기</p>
            </div>
        </div>

        <!-- 관리자 모달 -->
        <div class="admin-modal" id="admin-modal">
            <div class="admin-header">
                <h2>⚙️ 시스템 관리자 대시보드</h2>
                <button onclick="closeAdmin()" style="background:var(--danger); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">대시보드 닫기</button>
            </div>
            <div class="admin-layout">
                <div class="admin-sidebar">
                    <button id="tab-users" onclick="loadAdminTab('users')">👥 회원 관리</button>
                    <button id="tab-videos" onclick="loadAdminTab('videos')">🎥 비디오 DB 현황</button>
                    <button id="tab-logs" onclick="loadAdminTab('logs')">📊 접속 로그</button>
                    <button id="tab-blocks" onclick="loadAdminTab('blocks')">🛑 IP 차단 관리</button>
                </div>
                <div class="admin-content" id="admin-content">
                    <h3>왼쪽 메뉴를 선택해주세요.</h3>
                </div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="url-input" placeholder="YouTube 영상 링크를 입력하세요">
            <button onclick="startAnalysis()" id="extract-btn" style="background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700;">분석 시작</button>
        </div>

        <div id="status-area"></div>

        <div id="result-area" class="main-content">
            <div class="left-col">
                <div class="video-player-container" id="video-container"></div>
                <div class="card" style="margin-top: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin:0; font-size: 1.2rem;">📝 자막 전문</h2>
                        <button onclick="toggleTranscript()" id="toggle-btn" style="background: #334155; color: white; border:none; padding: 5px 10px; border-radius: 5px; cursor:pointer;">펼치기</button>
                    </div>
                    <div id="transcript-view" class="transcript-container"></div>
                </div>
            </div>
            <div class="right-col">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 1.2rem; color: var(--accent);">✨ AI 핵심 요약</h2>
                    <div id="summary-view" style="line-height: 1.8; color: #cbd5e1;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://tubeapi.tor-ai.com";
        let currentAuthMode = 'login';
        
        function setAuthMsg(text, type) {
            const msgEl = document.getElementById('auth-msg');
            msgEl.innerText = text;
            msgEl.className = type === 'error' ? 'msg-error' : 'msg-success';
            msgEl.style.display = 'block';
        }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('user'));
            const menu = document.getElementById('user-menu');
            
            if (user) {
                let adminBtn = user.is_admin === 1 ? `<button onclick="openAdmin()" style="background:var(--success); color:white; border:none; padding: 5px 15px; border-radius: 5px; cursor:pointer; font-weight:600; margin-left:10px;">관리자</button>` : '';
                
                menu.innerHTML = `
                    <div class="user-profile">
                        ${user.picture ? `<img src="${user.picture}">` : '<div style="width:28px; height:28px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div>'}
                        <span class="user-name">${user.name}님</span>
                        ${adminBtn}
                        <button onclick="logout()" style="background:transparent; color:var(--text-dim); border:none; cursor:pointer; font-size:0.85rem; margin-left:10px;">로그아웃</button>
                    </div>
                `;
            } else {
                menu.innerHTML = `
                    <button onclick="openAuth('login')" style="background:transparent; color:white; border:none; cursor:pointer;">로그인</button>
                    <button onclick="openAuth('register')" style="background:var(--accent); color:white; border:none; padding: 5px 15px; border-radius: 5px; cursor:pointer; font-weight:600;">회원가입</button>
                `;
            }
        }
        updateUI();

        function openAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = mode === 'login' ? '로그인' : '회원가입';
            document.getElementById('register-fields').style.display = mode === 'login' ? 'none' : 'block';
            document.getElementById('auth-switch').innerText = mode === 'login' ? '계정이 없으신가요? 회원가입' : '이미 계정이 있으신가요? 로그인';
            document.getElementById('auth-msg').style.display = 'none';
        }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function switchAuth() { openAuth(currentAuthMode === 'login' ? 'register' : 'login'); }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value;
            
            if (!email || !password || (currentAuthMode === 'register' && !name)) {
                setAuthMsg("모든 필드를 입력해주세요.", "error");
                return;
            }

            const endpoint = currentAuthMode === 'login' ? '/login' : '/register';
            const body = currentAuthMode === 'login' ? { email, password } : { email, password, name };

            try {
                const resp = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await resp.json();
                
                if (resp.ok) {
                    if (currentAuthMode === 'login') {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        setAuthMsg("로그인 성공! 이동 중...", "success");
                        setTimeout(() => location.reload(), 1000);
                    } else {
                        setAuthMsg("회원가입 성공! 로그인해주세요.", "success");
                        setTimeout(() => openAuth('login'), 1500);
                    }
                } else { 
                    setAuthMsg(data.detail || "오류가 발생했습니다.", "error"); 
                }
            } catch (e) { 
                setAuthMsg("서버와 통신할 수 없습니다.", "error"); 
            }
        }

        async function handleGoogleLogin(response) {
            try {
                const resp = await fetch(`${API_BASE}/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await resp.json();
                if (resp.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    setAuthMsg("구글 로그인 성공!", "success");
                    setTimeout(() => location.reload(), 1000);
                } else {
                    setAuthMsg("구글 로그인 실패", "error");
                }
            } catch (e) {
                setAuthMsg("연결 오류", "error");
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // --- 관리자 기능 ---
        function openAdmin() {
            document.getElementById('admin-modal').style.display = 'flex';
            loadAdminTab('users');
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

        async function fetchAdminData(endpoint) {
            const token = localStorage.getItem('token');
            const resp = await fetch(`${API_BASE}${endpoint}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(!resp.ok) { alert("관리자 권한이 없습니다."); closeAdmin(); return []; }
            return await resp.json();
        }

        async function loadAdminTab(tab) {
            const tabs = ['users', 'videos', 'logs', 'blocks'];
            tabs.forEach(t => document.getElementById(`tab-${t}`).classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            const content = document.getElementById('admin-content');
            content.innerHTML = '<div class="loader"></div> 로딩 중...';
            
            if (tab === 'users') {
                const data = await fetchAdminData('/admin/users');
                let html = '<h2>👥 회원 목록</h2><table class="admin-table"><tr><th>ID</th><th>이름</th><th>이메일</th><th>가입일</th><th>관리자</th></tr>';
                data.forEach(u => html += `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.created_at.split('T')[0]}</td><td>${u.is_admin ? '⭐ 관리자' : '일반'}</td></tr>`);
                html += '</table>';
                content.innerHTML = html;
            } else if (tab === 'videos') {
                const data = await fetchAdminData('/admin/videos');
                let html = '<h2>🎥 캐시된 비디오 데이터</h2><table class="admin-table"><tr><th>ID</th><th>비디오</th><th>제목</th><th>요청IP</th><th>조회수</th><th>등록일</th></tr>';
                data.forEach(v => html += `<tr><td>${v.id}</td><td><a href="https://youtube.com/watch?v=${v.video_id}" target="_blank" style="color:var(--accent)">${v.video_id}</a></td><td>${v.title}</td><td>${v.request_ip}</td><td>${v.view_count}회</td><td>${v.created_at.split('.')[0]}</td></tr>`);
                html += '</table>';
                content.innerHTML = html;
            } else if (tab === 'logs') {
                const data = await fetchAdminData('/admin/logs');
                let html = '<h2>📊 최근 접속 로그 (최대 500개)</h2><table class="admin-table"><tr><th>ID</th><th>IP</th><th>경로</th><th>메소드</th><th>시간</th></tr>';
                data.forEach(l => html += `<tr><td>${l.id}</td><td>${l.ip}</td><td>${l.endpoint}</td><td>${l.method}</td><td>${l.created_at.split('.')[0]}</td></tr>`);
                html += '</table>';
                content.innerHTML = html;
            } else if (tab === 'blocks') {
                const data = await fetchAdminData('/admin/blocked_ips');
                let html = `<h2>🛑 IP 차단 관리</h2>
                            <div style="margin-bottom:15px; display:flex; gap:10px;">
                                <input type="text" id="block-ip-input" placeholder="차단할 IP 주소 입력" style="padding:10px; border-radius:5px; border:1px solid var(--border); background:#0f172a; color:white; width:250px;"> 
                                <input type="text" id="block-reason-input" placeholder="차단 사유" style="padding:10px; border-radius:5px; border:1px solid var(--border); background:#0f172a; color:white; flex:1;">
                                <button onclick="blockIp()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">차단 등록</button>
                            </div>`;
                html += '<table class="admin-table"><tr><th>ID</th><th>IP 주소</th><th>차단 사유</th><th>차단 일시</th><th>관리</th></tr>';
                data.forEach(b => html += `<tr><td>${b.id}</td><td><strong style="color:var(--danger)">${b.ip}</strong></td><td>${b.reason}</td><td>${b.created_at.split('.')[0]}</td><td><button class="btn-danger" onclick="unblockIp('${b.ip}')">차단 해제</button></td></tr>`);
                html += '</table>';
                content.innerHTML = html;
            }
        }

        async function blockIp() {
            const ip = document.getElementById('block-ip-input').value.trim();
            const reason = document.getElementById('block-reason-input').value.trim();
            if(!ip) return alert("IP 주소를 입력해주세요.");
            
            const token = localStorage.getItem('token');
            await fetch(`${API_BASE}/admin/block_ip`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip: ip, reason: reason || "관리자 수동 차단" })
            });
            loadAdminTab('blocks');
        }

        async function unblockIp(ip) {
            if(!confirm(`${ip} 차단을 해제하시겠습니까?`)) return;
            const token = localStorage.getItem('token');
            await fetch(`${API_BASE}/admin/block_ip/${ip}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadAdminTab('blocks');
        }

        // --- 분석 로직 ---
        function toggleTranscript() {
            const tv = document.getElementById('transcript-view');
            const btn = document.getElementById('toggle-btn');
            const isVisible = tv.style.display === 'block';
            tv.style.display = isVisible ? 'none' : 'block';
            btn.innerText = isVisible ? '펼치기' : '접기';
        }

        async function startAnalysis() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return;
            
            const token = localStorage.getItem('token');
            const extractBtn = document.getElementById('extract-btn');
            extractBtn.disabled = true;
            
            document.getElementById('result-area').style.display = 'none';
            const statusArea = document.getElementById('status-area');
            statusArea.innerHTML = '<div class="loader"></div> <span id="status-text">분석을 시작합니다...</span>';
            statusArea.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}/smart-subtitles`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': token ? `Bearer ${token}` : ''
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    const err = await response.json();
                    statusArea.innerHTML = `<span style="color:var(--danger)">오류: ${err.detail}</span>`;
                    extractBtn.disabled = false;
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let accumulatedSummary = "";
                document.getElementById('result-area').style.display = 'grid';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    let parts = buffer.split("\n\n");
                    buffer = parts.pop();

                    for (const line of parts) {
                        if (!line.startsWith("data: ")) continue;
                        try {
                            const data = JSON.parse(line.substring(6));
                            if (data.type === 'video_id') {
                                document.getElementById('video-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${data.value}" frameborder="0" allowfullscreen></iframe>`;
                            } else if (data.type === 'status') {
                                document.getElementById('status-text').innerText = data.value;
                            } else if (data.type === 'transcript') {
                                document.getElementById('transcript-view').innerText = data.value;
                            } else if (data.type === 'chunk') {
                                accumulatedSummary += data.value;
                                document.getElementById('summary-view').innerHTML = marked.parse(accumulatedSummary);
                            } else if (data.type === 'summary_full') {
                                accumulatedSummary = data.value;
                                document.getElementById('summary-view').innerHTML = marked.parse(accumulatedSummary);
                            } else if (data.type === 'done') {
                                statusArea.style.display = 'none';
                            }
                        } catch(e){}
                    }
                }
            } catch (e) {
                statusArea.innerHTML = '<span style="color:var(--danger)">네트워크 오류가 발생했습니다.</span>';
            } finally { extractBtn.disabled = false; }
        }
    </script>
</body>
</html>
