<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI 요약기</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #ef4444;
            --accent-hover: #dc2626;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: #334155;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1200px; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 2.5rem; width: 100%; padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .user-menu { display: flex; gap: 10px; align-items: center; }
        .user-profile { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 50px; }
        .user-profile img { width: 28px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); }
        .user-name { font-weight: 600; color: var(--accent); }

        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--card-bg); padding: 2.5rem; border-radius: 1.5rem;
            width: 100%; max-width: 400px; border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 1.5rem; text-align: center; font-size: 1.5rem; }
        .modal-content input {
            width: 100%; padding: 0.85rem; margin-bottom: 1rem;
            background: #0f172a; border: 1px solid var(--border); border-radius: 0.75rem; color: white;
            font-size: 1rem;
        }
        #auth-msg { padding: 10px; border-radius: 0.5rem; margin-bottom: 1rem; font-size: 0.9rem; text-align: center; display: none; }
        .msg-error { background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .msg-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }

        .auth-btn { width: 100%; padding: 0.85rem; margin-bottom: 1rem; background: var(--accent); color: white; border: none; border-radius: 0.75rem; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .switch-auth { text-align: center; font-size: 0.9rem; color: var(--text-dim); cursor: pointer; margin-top: 1rem; }

        .input-section { display: flex; gap: 12px; margin-bottom: 2.5rem; background: var(--card-bg); padding: 1.5rem; border-radius: 1rem; border: 1px solid var(--border); }
        input[type="text"] { flex: 1; background: #0f172a; border: 1px solid var(--border); border-radius: 0.75rem; padding: 1rem; color: white; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; display: none; }
        
        /* 모바일 레이아웃 최적화 */
        @media (max-width: 900px) { 
            .main-content { grid-template-columns: 1fr; }
            .left-col { order: 1; display: flex; flex-direction: column; }
            .right-col { order: 2; }
            .video-player-container { order: 1; }
            #transcript-card { order: 2; margin-top: 1.5rem; }
            #download-card { order: 3; margin-top: 1.5rem; }
        }

        .video-player-container { 
            position: relative; width: 90%; max-width: 560px; margin: 0 auto 1.5rem auto; 
            padding-bottom: 50.625%; border-radius: 1rem; overflow: hidden; background: black; border: 1px solid var(--border);
        }
        .video-player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        
        .transcript-container { margin-top: 1rem; max-height: 400px; overflow-y: auto; display: none; white-space: pre-wrap; background: #0f172a; padding: 1rem; }
        .download-list { margin-top: 1rem; max-height: 300px; overflow-y: auto; display: none; /* 기본 접힘 */ }
        
        #status-area { text-align: center; padding: 1rem; display: none; }
        .loader { border: 4px solid rgba(239, 68, 68, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Admin UI */
        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: none; flex-direction: column; z-index: 2000; overflow: hidden; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--border); }
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        .admin-sidebar { width: 220px; background: var(--card-bg); border-right: 1px solid var(--border); padding: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        .admin-sidebar button { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 12px; text-align: left; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
        .admin-sidebar button.active { background: var(--accent); color: white; border-color: var(--accent); }
        .admin-content { flex: 1; padding: 2rem; overflow-y: auto; background: #0f172a; }
        .admin-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; }
        .admin-table th, .admin-table td { border-bottom: 1px solid var(--border); padding: 12px 15px; text-align: left; font-size: 0.9rem; }
        .admin-table th { background: #1e293b; color: var(--accent); font-weight: 600; }
        
        /* Download UI */
        .download-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .download-item:last-child { border-bottom: none; }
        .btn-sm { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; border: none; background: var(--success); color: white; }
        .btn-toggle { background: #334155; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 YouTube AI</h1>
            <div class="user-menu" id="user-menu"></div>
        </header>

        <div class="auth-modal" id="auth-modal">
            <div class="modal-content">
                <h3 id="modal-title">로그인</h3>
                <div id="auth-msg"></div>
                <div id="register-fields" style="display: none;"><input type="text" id="auth-name" placeholder="이름"></div>
                <input type="email" id="auth-email" placeholder="이메일">
                <input type="password" id="auth-password" placeholder="비밀번호">
                <button class="auth-btn" onclick="handleAuth()">확인</button>
                <div style="margin: 1.5rem 0; position: relative; text-align: center;"><hr style="border: 0; border-top: 1px solid var(--border);"><span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 0 10px; font-size: 0.8rem; color: var(--text-dim);">OR</span></div>
                <div id="g_id_onload" data-client_id="818619054130-32i1a8vcj21gc1i33mhrnsu84gnvm6h0.apps.googleusercontent.com" data-callback="handleGoogleLogin"></div>
                <div class="g_id_signin" data-type="standard" data-width="320"></div>
                <p class="switch-auth" id="auth-switch" onclick="switchAuth()">계정이 없으신가요? 회원가입</p>
                <p class="switch-auth" onclick="closeAuth()" style="color: var(--danger);">닫기</p>
            </div>
        </div>

        <div class="admin-modal" id="admin-modal">
            <div class="admin-header"><h2>⚙️ 관리자 대시보드</h2><button onclick="closeAdmin()" style="background:var(--danger); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer;">닫기</button></div>
            <div class="admin-layout">
                <div class="admin-sidebar">
                    <button id="tab-users" onclick="loadAdminTab('users')">👥 회원 관리</button>
                    <button id="tab-videos" onclick="loadAdminTab('videos')">🎥 비디오 DB</button>
                    <button id="tab-logs" onclick="loadAdminTab('logs')">📊 접속 로그</button>
                    <button id="tab-blocks" onclick="loadAdminTab('blocks')">🛑 IP 차단</button>
                </div>
                <div class="admin-content" id="admin-content"></div>
            </div>
        </div>

        <div class="input-section">
            <input type="text" id="url-input" placeholder="YouTube 영상 링크를 입력하세요">
            <button onclick="startAnalysis()" id="extract-btn" style="background: var(--accent); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-weight: 700;">분석 시작</button>
        </div>

        <div id="status-area"></div>

        <div id="result-area" class="main-content">
            <div class="left-col">
                <div class="video-player-container" id="video-container"></div>
                <div class="card" id="transcript-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin:0; font-size: 1.2rem;">📝 자막 전문</h2>
                        <button onclick="toggleCard('transcript-view', 'toggle-btn-sub')" id="toggle-btn-sub" class="btn-toggle">펼치기</button>
                    </div>
                    <div id="transcript-view" class="transcript-container"></div>
                </div>
                <!-- 다운로드 카드 -->
                <div class="card" id="download-card" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 style="margin:0; font-size: 1.2rem;">📥 다운로드 옵션</h2>
                        <button onclick="toggleCard('download-list', 'toggle-btn-dl')" id="toggle-btn-dl" class="btn-toggle">펼치기</button>
                    </div>
                    <div id="download-list" class="download-list"></div>
                </div>
            </div>
            <div class="right-col">
                <div class="card">
                    <h2 style="margin-top:0; font-size: 1.2rem; color: var(--accent);">✨ AI 핵심 요약</h2>
                    <div id="summary-view" style="line-height: 1.8; color: #cbd5e1;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://tubeapi.tor-ai.com";
        let currentAuthMode = 'login';
        
        function setAuthMsg(text, type) {
            const msgEl = document.getElementById('auth-msg');
            msgEl.innerText = text;
            msgEl.className = type === 'error' ? 'msg-error' : 'msg-success';
            msgEl.style.display = 'block';
        }

        function updateUI() {
            const user = JSON.parse(localStorage.getItem('user'));
            const menu = document.getElementById('user-menu');
            if (user) {
                let adminBtn = user.level === 'admin' ? `<button onclick="openAdmin()" style="background:var(--success); color:white; border:none; padding: 5px 15px; border-radius: 5px; cursor:pointer; font-weight:600; margin-left:10px;">관리자</button>` : '';
                menu.innerHTML = `<div class="user-profile">${user.picture ? `<img src="${user.picture}">` : '<div style="width:28px; height:28px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px;">👤</div>'}<span class="user-name">${user.name}님</span>${adminBtn}<button onclick="logout()" style="background:transparent; color:var(--text-dim); border:none; cursor:pointer; font-size:0.85rem; margin-left:10px;">로그아웃</button></div>`;
            } else {
                menu.innerHTML = `<button onclick="openAuth('login')" style="background:transparent; color:white; border:none; cursor:pointer;">로그인</button><button onclick="openAuth('register')" style="background:var(--accent); color:white; border:none; padding: 5px 15px; border-radius: 5px; cursor:pointer; font-weight:600;">회원가입</button>`;
            }
        }
        updateUI();

        function openAuth(mode) {
            currentAuthMode = mode;
            document.getElementById('auth-modal').style.display = 'flex';
            document.getElementById('modal-title').innerText = mode === 'login' ? '로그인' : '회원가입';
            document.getElementById('register-fields').style.display = mode === 'login' ? 'none' : 'block';
            document.getElementById('auth-msg').style.display = 'none';
        }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function switchAuth() { openAuth(currentAuthMode === 'login' ? 'register' : 'login'); }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const name = document.getElementById('auth-name').value;
            try {
                const resp = await fetch(`${API_BASE}${currentAuthMode === 'login' ? '/login' : '/register'}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, name })
                });
                const data = await resp.json();
                if (resp.ok) {
                    if (currentAuthMode === 'login') {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        location.reload();
                    } else { openAuth('login'); }
                } else { setAuthMsg(data.detail, "error"); }
            } catch (e) { setAuthMsg("에러", "error"); }
        }

        async function handleGoogleLogin(response) {
            try {
                const resp = await fetch(`${API_BASE}/auth/google`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                const data = await resp.json();
                if (resp.ok) { localStorage.setItem('token', data.access_token); localStorage.setItem('user', JSON.stringify(data.user)); location.reload(); }
            } catch (e) { alert("연결 오류"); }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // --- 관리자 ---
        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; loadAdminTab('users'); }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        async function fetchAdminData(endpoint) {
            const resp = await fetch(`${API_BASE}${endpoint}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
            return await resp.json();
        }
        async function loadAdminTab(tab) {
            const content = document.getElementById('admin-content');
            content.innerHTML = '로딩 중...';
            if (tab === 'users') {
                const data = await fetchAdminData('/admin/users');
                let html = '<h2>👥 회원 관리</h2><table class="admin-table"><tr><th>ID</th><th>이메일</th><th>레벨</th></tr>';
                data.forEach(u => html += `<tr><td>${u.name}</td><td>${u.email}</td><td><select onchange="updateUserLevel('${u.email}', this.value)"><option value="admin" ${u.level==='admin'?'selected':''}>관리자</option><option value="user2" ${u.level==='user2'?'selected':''}>일반2</option><option value="user" ${u.level==='user'?'selected':''}>일반</option><option value="pending" ${u.level==='pending'?'selected':''}>보류</option></select></td></tr>`);
                content.innerHTML = html + '</table>';
            } else if (tab === 'videos') {
                const data = await fetchAdminData('/admin/videos');
                let html = '<h2>🎥 비디오 DB</h2><table class="admin-table"><tr><th>제목</th><th>조회</th></tr>';
                data.forEach(v => html += `<tr><td>${v.title}</td><td>${v.view_count}회</td></tr>`);
                content.innerHTML = html + '</table>';
            }
        }
        async function updateUserLevel(email, level) {
            await fetch(`${API_BASE}/admin/update_user_level`, { method: 'POST', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ email, level }) });
            alert("완료");
        }

        // --- 카드 토글 ---
        function toggleCard(contentId, btnId) {
            const el = document.getElementById(contentId);
            const btn = document.getElementById(btnId);
            const isVisible = el.style.display === 'block';
            el.style.display = isVisible ? 'none' : 'block';
            btn.innerText = isVisible ? '펼치기' : '접기';
        }

        // --- 다운로드 ---
        async function loadDownloadOptions(url) {
            const card = document.getElementById('download-card');
            const list = document.getElementById('download-list');
            const btn = document.getElementById('toggle-btn-dl');
            list.innerHTML = '포맷 정보를 불러오는 중...';
            card.style.display = 'block';
            
            // 초기화: 접힌 상태로 유지
            list.style.display = 'none';
            btn.innerText = '펼치기';

            try {
                const resp = await fetch(`${API_BASE}/video-formats?url=${encodeURIComponent(url)}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const data = await resp.json();
                if (resp.ok) {
                    let html = '';
                    data.formats.slice(0, 15).forEach(f => {
                        html += `<div class="download-item"><span>[${f.type.toUpperCase()}] ${f.resolution} (${f.ext}) ${f.note}</span><button class="btn-sm" onclick="downloadFile('${url}', '${f.format_id}')">다운로드</button></div>`;
                    });
                    list.innerHTML = html;
                } else { list.innerHTML = '권한 없음'; }
            } catch (e) { list.innerHTML = '에러'; }
        }

        async function downloadFile(url, format_id) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '⏳ 수신 중...';
            btn.disabled = true;
            try {
                const response = await fetch(`${API_BASE}/download-file?url=${encodeURIComponent(url)}&format_id=${format_id}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if (!response.ok) throw new Error("실패");
                
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = "download.mp4";
                if (contentDisposition) {
                    const match = contentDisposition.match(/filename\*=UTF-8''(.+)/);
                    if (match) filename = decodeURIComponent(match[1]);
                }

                const reader = response.body.getReader();
                const chunks = [];
                let receivedLength = 0;
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    btn.innerText = `⏳ ${(receivedLength / 1024 / 1024).toFixed(1)}MB`;
                }
                const blob = new Blob(chunks);
                const dUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = dUrl; a.download = filename; a.click();
                btn.innerText = '✅ 완료';
            } catch (e) { alert(e.message); btn.innerText = '❌ 실패'; }
            finally { setTimeout(() => { btn.innerText = originalText; btn.disabled = false; }, 2000); }
        }

        // --- 분석 시작 ---
        async function startAnalysis() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return;
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('download-card').style.display = 'none';
            document.getElementById('status-area').style.display = 'block';
            document.getElementById('status-area').innerHTML = '<div class="loader"></div> <span id="status-text">시작 중...</span>';

            try {
                const response = await fetch(`${API_BASE}/smart-subtitles`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ url }) });
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = ""; let accumulatedSummary = "";
                document.getElementById('result-area').style.display = 'grid';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    let parts = buffer.split("\n\n"); buffer = parts.pop();
                    for (const line of parts) {
                        if (!line.startsWith("data: ")) continue;
                        const data = JSON.parse(line.substring(6));
                        if (data.type === 'video_id') { document.getElementById('video-container').innerHTML = `<iframe src="https://www.youtube.com/embed/${data.value}" frameborder="0" allowfullscreen></iframe>`; }
                        else if (data.type === 'status') { document.getElementById('status-text').innerText = data.value; }
                        else if (data.type === 'transcript') { document.getElementById('transcript-view').innerText = data.value; }
                        else if (data.type === 'chunk') { accumulatedSummary += data.value; document.getElementById('summary-view').innerHTML = marked.parse(accumulatedSummary); }
                        else if (data.type === 'summary_full') { accumulatedSummary = data.value; document.getElementById('summary-view').innerHTML = marked.parse(accumulatedSummary); }
                        else if (data.type === 'can_download') { loadDownloadOptions(data.url); }
                        else if (data.type === 'done') { document.getElementById('status-area').style.display = 'none'; }
                    }
                }
            } catch (e) { }
        }
    </script>
</body>
</html>
